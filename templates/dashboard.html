<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            background: url('{{ url_for('static', filename='autism2.jpg') }}') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .card {
            max-width: 400px;
            margin: 0 auto;
            height: 200px;
            border: none;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .card-img-top {
            height: 90px;
            object-fit: cover;
            border-radius: 10px 10px 0 0;
        }

        .card-body {
            padding: 10px;
            text-align: center;
        }

        .card .btn {
            font-size: 16px;
            padding: 8px;
        }

        #chatbot-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }

        .chatbot-btn {
            width: 60px;
            height: 60px;
            background-color: #007BFF;
            border: none;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            color: white;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chatbot-window {
            display: none;
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 350px; /* Increased width */
            height: 500px; /* Increased height */
            background: white;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
        }

        .chatbot-header {
            background: #007BFF;
            color: white;
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }

        .chatbot-messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            font-size: 14px;
            max-height: 350px; /* Increased height */
        }

        .chatbot-input {
            padding: 10px;
            border-top: 1px solid #ccc;
            display: flex;
            flex-direction: column;
        }

        .chatbot-options button {
            display: block;
            width: 100%;
            margin: 5px 0;
            background: #007BFF;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .chatbot-options button:hover {
            background: #0056b3;
        }

        .chatbot-input textarea {
            width: 100%;
            padding: 10px;
            resize: none;
            border-radius: 5px;
            height: 60px; /* Adjusted height */
        }

        .chatbot-input button {
            background: #007BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-top: 5px;
            cursor: pointer;
            border-radius: 5px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container my-5">
        <h2 class="text-center mb-4">Welcome to the Autism Detection Dashboard</h2>
        <div class="row justify-content-center text-center">
            <div class="col-md-6 mb-4">
                <div class="card shadow-lg">
                    <img src="{{ url_for('static', filename='autism.jpg') }}" class="card-img-top" alt="Upload Image">
                    <div class="card-body">
                        <p class="card-text">Upload a profile image to start the autism detection process.</p>
                        <a href="/upload" class="btn btn-primary">Go to Upload</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card shadow-lg">
                    <img src="{{ url_for('static', filename='autism.jpg') }}" class="card-img-top" alt="View Results">
                    <div class="card-body">
                        <p class="card-text">Check the results of your previous autism detection uploads.</p>
                        <a href="/result" class="btn btn-success">View Results</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chatbot Widget -->
    <div id="chatbot-container">
        <button class="chatbot-btn" onclick="toggleChatbot()">💬</button>
        <div class="chatbot-window">
            <div class="chatbot-header">Chat Support</div>
            <div class="chatbot-messages" id="chatbot-messages"></div>
            <div class="chatbot-input" id="chatbot-input-container" style="display: none;">
                <textarea id="chatbot-input" placeholder="Type your query..."></textarea>
                <button onclick="sendCustomQuery()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let chatbotStarted = false;

        function toggleChatbot() {
            const chatbotWindow = document.querySelector('.chatbot-window');
            chatbotWindow.style.display = chatbotWindow.style.display === 'block' ? 'none' : 'block';

            if (!chatbotStarted) {
                startConversation();
                chatbotStarted = true;
            }
        }

        function startConversation() {
            const messagesContainer = document.getElementById('chatbot-messages');
            messagesContainer.innerHTML = ` 
                <div>Bot: Hi! How can I assist you today?</div>
                <div class="chatbot-options">
                    <button onclick="handleOptionClick('Parent')">Parent</button>
                    <button onclick="handleOptionClick('Guardian')">Guardian</button>
                </div>
            `;
        }

        function handleOptionClick(option) {
            const messagesContainer = document.getElementById('chatbot-messages');
            const userMessage = document.createElement('div');
            userMessage.textContent = "You: " + option;
            messagesContainer.appendChild(userMessage);

            const botMessage = document.createElement('div');
            botMessage.textContent = "Bot: " + getResponse(option);
            messagesContainer.appendChild(botMessage);

            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            if (option === "Parent") {
                showBehaviorQuestions();
            }

            if (option === "Guardian") {
                askRelationToChild(option);
            }

            if (option === "Other") {
                showTypingSpace();
            }
        }

        function askRelationToChild(role) {
            const messagesContainer = document.getElementById('chatbot-messages');
            const relationQuestion = ` 
                <div>Bot: What is your relation to the child?</div>
                <button onclick="handleRelationAnswer('Aunt/Uncle')">Aunt/Uncle</button>
                <button onclick="handleRelationAnswer('Grandparent')">Grandparent</button>
                <button onclick="handleRelationAnswer('Other')">Other</button>
            `;
            messagesContainer.innerHTML += relationQuestion;
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function handleRelationAnswer(relation) {
            const messagesContainer = document.getElementById('chatbot-messages');
            const userMessage = document.createElement('div');
            userMessage.textContent = "You: " + relation;
            messagesContainer.appendChild(userMessage);

            const botMessage = document.createElement('div');
            botMessage.textContent = "Bot: Thank you for sharing your relationship.";
            messagesContainer.appendChild(botMessage);

            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            showBehaviorQuestions();
        }

        function showBehaviorQuestions() {
            const messagesContainer = document.getElementById('chatbot-messages');
            const behaviorQuestions = `
                <div>Bot: Please tell us more about the child's behavior:</div>
                <button onclick="handleOptionClick('Child has difficulty maintaining eye contact')">Child has difficulty maintaining eye contact</button>
                <button onclick="handleOptionClick('Child shows repetitive behaviors')">Child shows repetitive behaviors</button>
                <button onclick="handleOptionClick('Child struggles with social interaction')">Child struggles with social interaction</button>
                <button onclick="handleOptionClick('Other')">Other (Please type)</button>
            `;
            messagesContainer.innerHTML += behaviorQuestions;
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTypingSpace() {
            const inputContainer = document.getElementById('chatbot-input-container');
            inputContainer.style.display = 'block';
        }

        function getResponse(option) {
            const responses = {
                "Parent": "What would you like to know about supporting your child?",
                "Guardian": "How can I assist you with your caregiving responsibilities?",
                "Child has difficulty maintaining eye contact": "Eye contact is challenging but can improve with practice.",
                "Child shows repetitive behaviors": "Repetitive behaviors can be managed through structured activities.",
                "Child struggles with social interaction": "Social skills training may help with interactions.",
                "Other": "Please type your issue below.",
            };
            return responses[option] || "I don't have information on that yet.";
        }

        function sendCustomQuery() {
            const inputField = document.getElementById('chatbot-input');
            const query = inputField.value.trim();
            const messagesContainer = document.getElementById('chatbot-messages');

            if (query) {
                const userMessage = document.createElement('div');
                userMessage.textContent = "You: " + query;
                messagesContainer.appendChild(userMessage);

                const botMessage = document.createElement('div');
                botMessage.textContent = "Bot: I'll get back to you on that!";
                messagesContainer.appendChild(botMessage);

                inputField.value = '';
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        }
    </script>
</body>
</html>
