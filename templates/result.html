<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0-alpha1/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('{{ url_for("static", filename="autism9.webp") }}') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0; /* Remove default body margin */
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 100%; /* Make sure container takes full width */
        }

        .result-box {
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #ccc;
            background-color: #000; /* Set background color to black */
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            width: 80%;
            max-width: 600px; /* Restrict max width */
        }

        .result-text {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #fff; /* Set text color to white */
        }

        .result-icon {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .action-buttons a {
            margin: 10px;
            font-size: 16px;
            color: #fff; /* Set button text color to white */
        }

        .action-buttons a:hover {
            color: #000; /* Change color on hover */
        }

    </style>
</head>
<body>

<div class="container">
    <div class="result-box">
        <div class="result-icon">
            {% if result == 'Autistic' %}
                <span style="color: #e74c3c;">&#9888;</span> <!-- Warning icon for Autism -->
            {% else %}
                <span style="color: #2ecc71;">&#9989;</span> <!-- Check mark for Non-Autistic -->
            {% endif %}
        </div>

        <div class="result-text">
            {% if result == 'Autistic' %}
                Autism Detected
            {% else %}
                No Autism Detected
            {% endif %}
        </div>

        <div class="action-buttons">
            <a href="{{ url_for('upload') }}" class="btn btn-primary">Upload Another Image</a>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0-alpha1/js/bootstrap.bundle.min.js"></script>
</body>
</html>
